name: Forward PR to Internal

# GitHub Actions on the github.com replica side.
# Saves the diff patch and meta as Artifacts when a 3rd party creates or updates a PR targeting main.
# (Internal team members download the Artifact and pass it to apply-external-pr.sh)
#
# Why pull_request_target is used:
#   With the pull_request event, GITHUB_TOKEN does not have access to the PR API,
#   causing gh pr diff / gh pr view to return HTTP 403.
#   pull_request_target runs in the security context of the base repository,
#   so the token can access the PR API.
#   The PR head code is not checked out, so untrusted code is never executed.

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  generate-patch:
    runs-on: ubuntu-latest
    # sync/* branches are internal delivery PRs — skip them
    if: ${{ !startsWith(github.head_ref, 'sync/') }}
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Generate patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --patch > pr.patch

      - name: Generate meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Safely escape newlines and special characters in pr_body using jq
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json body --jq '.body')

          jq -n \
            --argjson pr_number '${{ github.event.pull_request.number }}' \
            --arg     pr_title  '${{ github.event.pull_request.title }}' \
            --arg     pr_body   "$PR_BODY" \
            --arg     pr_author '${{ github.event.pull_request.user.login }}' \
            --arg     pr_url    '${{ github.event.pull_request.html_url }}' \
            --arg     head_sha  '${{ github.event.pull_request.head.sha }}' \
            '{
              pr_number: $pr_number,
              pr_title:  $pr_title,
              pr_body:   $pr_body,
              pr_author: $pr_author,
              pr_url:    $pr_url,
              head_sha:  $head_sha
            }' > pr-meta.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: |
            pr.patch
            pr-meta.json
          retention-days: 30

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="**This PR is for upstream patch generation only — do not merge.**"$'\n'"The diff has been forwarded to the upstream team for review. This PR will be closed after the upstream review process is complete."$'\n\n'"**Patch artifact:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT"
