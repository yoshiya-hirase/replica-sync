name: Forward PR to Internal

# github.com レプリカ側の GitHub Actions。
# 3rd party が main へ PR を作成・更新した際に
# 差分 patch と meta を Artifact として保存する。
# （社内担当者が Artifact をダウンロードして apply-external-pr.sh に渡す）
#
# pull_request_target を使う理由:
#   pull_request イベントでは GITHUB_TOKEN が PR API へのアクセス権を持たず
#   gh pr diff / gh pr view が HTTP 403 になるため。
#   pull_request_target はベースリポジトリのセキュリティコンテキストで動作し
#   トークンが PR API にアクセスできる。
#   PR ヘッドのコードは checkout しないので untrusted code は実行されない。

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  generate-patch:
    runs-on: ubuntu-latest
    # sync/* branches are internal delivery PRs — skip them
    if: ${{ !startsWith(github.head_ref, 'sync/') }}
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Generate patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --patch > pr.patch

      - name: Generate meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # pr_body 内の改行・特殊文字を jq で安全にエスケープ
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json body --jq '.body')

          jq -n \
            --argjson pr_number '${{ github.event.pull_request.number }}' \
            --arg     pr_title  '${{ github.event.pull_request.title }}' \
            --arg     pr_body   "$PR_BODY" \
            --arg     pr_author '${{ github.event.pull_request.user.login }}' \
            --arg     pr_url    '${{ github.event.pull_request.html_url }}' \
            --arg     head_sha  '${{ github.event.pull_request.head.sha }}' \
            '{
              pr_number: $pr_number,
              pr_title:  $pr_title,
              pr_body:   $pr_body,
              pr_author: $pr_author,
              pr_url:    $pr_url,
              head_sha:  $head_sha
            }' > pr-meta.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: |
            pr.patch
            pr-meta.json
          retention-days: 30

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "差分パッチを生成しました。社内レビュープロセスに転送中です。結果はレビュー完了後にコメントで通知されます。"
